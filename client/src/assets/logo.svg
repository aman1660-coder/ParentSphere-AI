<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Sphere -->
  <circle cx="50" cy="50" r="45" fill="url(#sphereGrad)" opacity="0.9" />
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="8 4" />

  <!-- Parent Silhouette -->
  <path d="M40 55 C40 45, 55 45, 55 55 C55 55, 60 75, 50 80 C40 75, 45 55, 40 55 Z" fill="white" filter="url(#glow)"/>
  <circle cx="47.5" cy="40" r="6" fill="white" filter="url(#glow)"/>

  <!-- Child Silhouette -->
  <path d="M55 60 C55 52, 65 52, 65 60 C65 60, 68 75, 60 78 C52 75, 55 60, 55 60 Z" fill="rgba(255,255,255,0.85)" />
  <circle cx="60" cy="50" r="4.5" fill="rgba(255,255,255,0.85)" />

  <!-- Sparkle/Growth star -->
  <path d="M30 35 Q35 35 35 30 Q35 35 40 35 Q35 35 35 40 Q35 35 30 35 Z" fill="white" opacity="0.8" />
</svg>
