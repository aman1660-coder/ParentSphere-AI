<!DOCTYPE html>
<html>
<head>
<title>My Appointments</title>

<style>
body{
background:#0f2027;
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#203a43;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.card h3{
margin:0;
color:#00eaff;
}

.card p{
margin:5px 0;
}

.empty{
text-align:center;
margin-top:50px;
color:gray;
}
</style>

</head>

<body>

<h1>My Appointments</h1>

<div class="container" id="list"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
location.href="index.html";
}

fetch("http://localhost:5000/api/appointments")
.then(res=>res.json())
.then(data=>{

const my = data.filter(a => a.email === user.email);

const list = document.getElementById("list");

if(my.length === 0){
list.innerHTML = "<div class='empty'>No appointments found</div>";
return;
}

my.forEach(a=>{
list.innerHTML += `
<div class="card">
<h3>${a.doctorName}</h3>
<p>📅 ${a.date}</p>
<p>⏰ ${a.time}</p>
</div>
`;
});

});

</script>

</body>
</html>
