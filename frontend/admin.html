<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - ParentSphere</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #0f2027;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

h2 { color: #00eaff; }

/* SEARCH */
.search {
    margin: 20px;
    text-align: center;
}

input {
    padding: 10px;
    width: 300px;
    border-radius: 6px;
    border: none;
}

/* TABLE */
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: rgba(255,255,255,0.1);
}

tr {
    background: rgba(255,255,255,0.05);
}

/* BUTTONS */
button {
    padding: 6px 10px;
    margin: 2px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.approve { background: green; }
.reject { background: orange; }
.delete { background: red; }

/* STATUS COLORS */
.pending { color: yellow; }
.approved { color: lightgreen; }
.rejected { color: red; }

</style>
</head>

<body>

<header>
    <h2>ParentSphere Admin</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="search">
    <input type="text" id="search" placeholder="Search by name/email..." onkeyup="filterData()">
</div>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Doctor</th>
    <th>Date</th>
    <th>Time</th>
    <th>Status</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

async function loadAll() {

    const token = localStorage.getItem("token");

    const res = await fetch("http://localhost:5000/api/appointments/all", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const table = document.getElementById("table");

    data.forEach(a => {
        table.innerHTML += `
        <tr>
            <td>${a.parentName}</td>
            <td>${a.email}</td>
            <td>${a.doctorName}</td>
            <td>${a.date}</td>
            <td>${a.time}</td>
        </tr>
        `;
    });
}

loadAll();

</script>

</body>
</html>
