<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
font-family:'Segoe UI',sans-serif;
}

/* LEFT */
.left{
width:50%;
background:linear-gradient(135deg,#00ff95,#00eaff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:black;
padding:40px;
}

.left h1{
font-size:45px;
}

/* RIGHT */
.right{
width:50%;
background:#0f2027;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:320px;
padding:25px;
border-radius:12px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
color:white;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:linear-gradient(to right,#00ff95,#00eaff);
cursor:pointer;
font-weight:bold;
}

a{
color:#00eaff;
}

</style>
</head>

<body>

<div class="left">
<h1>Join ParentSphere</h1>
<p>Create your smart parenting account</p>
</div>

<div class="right">

<div class="card">

<h2 style="text-align:center">Register</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p style="text-align:center;margin-top:10px;">
<a href="index.html">Login</a>
</p>

</div>

</div>

<script>

async function register(){

const res = await fetch("http://localhost:5000/api/users/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: name.value,
email: email.value,
password: password.value
})
});

const data = await res.json();

if(res.ok){
alert("Registered ✅");
window.location.href="index.html";
}else{
alert(data.message);
}

}

</script>

</body>
</html>
