<!DOCTYPE html>
<html>
<head>
<title>ParentSphere Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:22px;
color:#00eaff;
font-weight:bold;
margin-bottom:30px;
}

.menu a{
display:block;
padding:10px;
margin:10px 0;
border-radius:6px;
text-decoration:none;
color:white;
transition:0.3s;
}

.menu a:hover{
background:#00eaff;
color:black;
}

/* MAIN */
.main{
flex:1;
padding:30px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.profile{
background:rgba(255,255,255,0.1);
padding:8px 15px;
border-radius:20px;
}

/* DASHBOARD */
.dashboard{
margin-top:40px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:220px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,255,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
color:#00eaff;
}

/* BUTTON */
button{
margin-top:15px;
padding:10px;
border:none;
border-radius:6px;
background:linear-gradient(to right,#00ff95,#00eaff);
cursor:pointer;
}

/* FOOTER */
.footer{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
color:gray;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div>
<div class="logo">ParentSphere</div>

<div class="menu">
<a href="#">🏠 Dashboard</a>
<a href="appointments.html">📅 My Appointments</a>
<a href="bookappointment.html">➕ Book Appointment</a>
<a href="#">📘 Resources</a>
</div>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1 id="welcome"></h1>
<div class="profile">👤 User</div>
</div>

<div class="dashboard">

<div class="card">
<h2>📅 Appointments</h2>
<p id="count">0</p>
<button onclick="goAppointments()">View</button>
</div>

<div class="card">
<h2>➕ Book Session</h2>
<p>Schedule with experts</p>
<button onclick="goBook()">Book Now</button>
</div>

<div class="card">
<h2>🧠 Tips</h2>
<p>Parenting advice</p>
<button onclick="alert('Coming soon')">Explore</button>
</div>

<div class="card">
<h2>📘 Resources</h2>
<p>Guides & materials</p>
<button onclick="alert('Coming soon')">Open</button>
</div>

</div>

</div>

<div class="footer">
© 2026 ParentSphere
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="index.html";
}

// welcome
document.getElementById("welcome").innerText = "Welcome " + user.name;

// appointment count
fetch("http://localhost:5000/api/appointments")
.then(res=>res.json())
.then(data=>{
const my = data.filter(a => a.email === user.email);
document.getElementById("count").innerText = my.length;
});

// navigation
function goAppointments(){
window.location.href="appointments.html";
}

function goBook(){
window.location.href="bookappointment.html";
}

// logout
function logout(){
localStorage.removeItem("user");
window.location.href="index.html";
}

</script>

</body>
</html>
